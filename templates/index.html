<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Control de Equipos | Campuslands</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body class="bg-slate-50">

    <nav class="bg-blue-900 text-white p-4 shadow-md">
        <div class="container mx-auto flex justify-between items-center">
            <div class="flex items-center space-x-3">
                <i class="fas fa-desktop text-2xl"></i>
                <h1 class="text-xl font-bold">CAMPUSLANDS INVENTORY</h1>
            </div>
            <div id="api-indicator" class="text-xs flex items-center">
                <span class="w-2 h-2 bg-gray-400 rounded-full mr-2"></span>
                CONECTANDO AL SERVIDOR...
            </div>
        </div>
    </nav>

    <main class="container mx-auto p-6">
        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            
            <!-- Panel Lateral de Acciones -->
            <div class="lg:col-span-1 space-y-6">
                <div class="card p-6 border border-slate-200">
                    <h2 class="text-lg font-bold text-slate-800 mb-4">
                        <i class="fas fa-plus-circle text-blue-600 mr-2"></i>Nuevo Préstamo
                    </h2>
                    <form id="form-prestamo" class="space-y-4">
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase">ID del Camper</label>
                            <input type="text" id="input-camper" required class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500" placeholder="Ej: CAMP-001">
                        </div>
                        <div>
                            <label class="block text-xs font-semibold text-slate-500 uppercase">ID del Equipo</label>
                            <input type="number" id="input-equipo" required class="w-full mt-1 p-2 border rounded-md outline-none focus:ring-2 focus:ring-blue-500" placeholder="ID numérico">
                        </div>
                        <button type="submit" class="w-full btn-primary">REGISTRAR SALIDA</button>
                    </form>
                </div>

                <div class="bg-blue-50 p-4 rounded-lg border border-blue-100">
                    <h3 class="text-blue-800 font-bold text-sm">Resumen de Hoy</h3>
                    <div class="mt-2 grid grid-cols-2 gap-2 text-center">
                        <div class="bg-white p-2 rounded shadow-sm">
                            <span id="stat-total" class="block text-xl font-bold">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">Total</span>
                        </div>
                        <div class="bg-white p-2 rounded shadow-sm">
                            <span id="stat-libres" class="block text-xl font-bold text-green-600">0</span>
                            <span class="text-[10px] text-slate-400 uppercase">Libres</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Tabla de Inventario Principal -->
            <div class="lg:col-span-3">
                <div class="card overflow-hidden">
                    <div class="p-4 bg-slate-50 border-b flex justify-between items-center">
                        <h2 class="font-bold text-slate-700">Estado de Equipos en Tiempo Real</h2>
                        <button onclick="fetchInventory()" class="text-blue-600 hover:text-blue-800 transition">
                            <i class="fas fa-sync-alt"></i>
                        </button>
                    </div>
                    <div class="overflow-x-auto">
                        <table class="w-full text-left">
                            <thead class="bg-slate-100 text-slate-500 text-xs uppercase">
                                <tr>
                                    <th class="px-6 py-4">ID / Serial</th>
                                    <th class="px-6 py-4">Marca y Modelo</th>
                                    <th class="px-6 py-4">Estado</th>
                                    <th class="px-6 py-4 text-right">Acción</th>
                                </tr>
                            </thead>
                            <tbody id="table-body" class="divide-y divide-slate-100">
                                <!-- Datos cargados por JS -->
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="toast" class="fixed bottom-5 right-5 hidden translate-y-10 opacity-0 transition-all duration-300">
        <div class="bg-slate-800 text-white px-6 py-3 rounded-xl shadow-2xl flex items-center">
            <span id="toast-msg">Mensaje del sistema</span>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
